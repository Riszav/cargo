worker_processes 8;

events {
    worker_connections 512;
}

error_log /var/log/nginx-error.log info;

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream backend {
        server web:8000;
    }

    server {

        listen 443 ssl;
        server_name moicargo.kg;

        ssl_certificate /etc/letsencrypt/live/moicargo.kg/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/moicargo.kg/privkey.pem;

        location / {
            index index.html;
            root /usr/src/app/dist;
            try_files $uri $uri/ /index.html;
        }

        location ~ ^/(api/v1|admin|admin/|ckeditor5/|swagger/|redoc/|schema/) {
            proxy_pass http://backend;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $server_name;
            client_max_body_size 128M;
            proxy_redirect off;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

        }

        location /back_static/ {
            alias /usr/src/app/back_static/;
        }

        location /back_media/ {
            alias /usr/src/app/back_media/;
        }

    }


    server {
        listen 80;
        server_name moicargo.kg;
        return 301 https://$host$request_uri;
    }

}
