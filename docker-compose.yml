  version: '3'
  services:
    web:
      container_name: cargo
      restart: always
      build:
        context: .
      env_file: 
        - .env
      volumes:
        - .:/app
        - back_static:/usr/src/app/back_static
        - back_media:/usr/src/app/back_media
      depends_on:
        - pgdb
        - frontend
      command: sh -c "python manage.py makemigrations && 
                      python manage.py migrate && 
                      python manage.py collectstatic --noinput &&
                      gunicorn config.wsgi:application --bind 0.0.0.0:8000"
      ports:
        - "8000:8000"

    pgdb:
      image: postgres:17.5
      container_name: cargo_postgres
      restart: always
      env_file: 
        - .env
      environment:
        POSTGRES_DB: ${SQL_DATABASE}
        POSTGRES_USER: ${SQL_USER}
        POSTGRES_PASSWORD: ${SQL_PASSWORD}
      ports:
        - "5432:5432"
      volumes:
        - db_data:/var/lib/postgresql/data/

    frontend:
      container_name: cargo_front
      build:
        context: ../front_cargo
      env_file:
        - .env
      volumes:
        - dist_volume:/dist_volume

    nginx:
      image: nginx
      container_name: cargo_nginx
      restart: always
      ports:
        - "80:80"
        - "443:443"
      volumes:
        # - ./nginx.conf:/etc/nginx/conf.d/default.conf
        - ./nginx_ssl.conf:/etc/nginx/nginx.conf
        - back_static:/usr/src/app/back_static
        - back_media:/usr/src/app/back_media
        - dist_volume:/usr/src/app/dist
        - /etc/letsencrypt:/etc/letsencrypt
      depends_on:
        - web
        - frontend

  volumes:
    back_static:
    back_media:
    db_data:
    dist_volume:
